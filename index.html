<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Weltspiel Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root { 
    --bg: #f8fafc; 
    --text: #1e293b; 
    --accent: #22c55e; 
    --error: #ef4444; 
}

html, body {
    margin:0; height:100%;
    font-family:sans-serif;
    background: var(--bg);
    overflow:hidden;
}

#map {
    height:100%;
    width:100%;
    touch-action: pan-x pan-y;
}

#topBar {
    position:absolute; top:0; width:100%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    padding:10px;
    display:grid;
    grid-template-columns:auto 1fr auto;
    align-items:center;
    z-index:1000;
}

#message { text-align:center; font-weight:bold; }
#smiley { font-size:22px; }
#scoreDisplay { text-align:right; font-size:13px; }

.overlay {
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    padding:20px;
    border-radius:12px;
    display:none;
    z-index:2000;
    color:white;
    text-align:center;
    min-width:220px;
}

#correct { background: var(--accent); }
#solution { background: var(--error); }

.overlay button {
    margin-top:12px;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:white;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

#start {
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:white;
    z-index:3000;
}

input, select {
    padding:10px;
    margin:5px;
    border-radius:8px;
}

button {
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
}

.pulse {
    animation: pulse 0.5s ease;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="start">
    <h2>🌍 Weltspiel</h2>
    <input type="number" id="playerCount" min="1" max="4" value="1">
    <div id="playerInputs"></div>

    <select id="gameMode">
        <option value="country">Länder</option>
        <option value="capital">Hauptstädte</option>
    </select>

    <button onclick="startGame()">Start</button>
</div>

<div id="topBar">
    <div id="smiley">🤔</div>
    <div id="message">Bereit?</div>
    <div id="scoreDisplay"></div>
</div>

<div id="map"></div>

<div id="correct" class="overlay"></div>
<div id="solution" class="overlay"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ================== GAME STATE ==================
const Game = {
    players: [],
    scores: {},
    currentPlayer: 0,
    currentCountry: "",
    attempts: 0,
    mode: "country"
};

let waitingForNext = false;

// ================== DATA ==================
const capitals = {
    "Deutschland": "Berlin", "France": "Paris", "Italy": "Rom", "Spain": "Madrid", "Poland": "Warschau",
    "Ukraine": "Kiew", "Sweden": "Stockholm", "Norway": "Oslo", "Finland": "Helsinki", "Austria": "Wien",
    "Switzerland": "Bern", "United Kingdom": "London", "Ireland": "Dublin", "Netherlands": "Amsterdam",
    "Belgium": "Brüssel", "Portugal": "Lissabon", "Greece": "Athen", "Denmark": "Kopenhagen",
    "Czech Republic": "Prag", "Hungary": "Budapest", "Romania": "Bukarest", "Bulgaria": "Sofia",
    "Slovakia": "Bratislava", "Croatia": "Zagreb", "Slovenia": "Ljubljana", "Estonia": "Tallinn",
    "Latvia": "Riga", "Lithuania": "Vilnius", "Serbia": "Belgrad", "Bosnia and Herzegovina": "Sarajevo",
    "Albania": "Tirana", "Macedonia": "Skopje", "Moldova": "Chișinău", "Iceland": "Reykjavík", "Belarus": "Minsk",
    // Nord- & Südamerika
    "USA": "Washington D.C.", "Canada": "Ottawa", "Mexico": "Mexiko-Stadt", "Brazil": "Brasília",
    "Argentina": "Buenos Aires", "Chile": "Santiago", "Colombia": "Bogotá", "Peru": "Lima",
    "Venezuela": "Caracas", "Ecuador": "Quito", "Bolivia": "Sucre", "Paraguay": "Asunción",
    "Uruguay": "Montevideo", "Cuba": "Havanna", "Panama": "Panama-Stadt",
    // Asien & Ozeanien
    "China": "Peking", "Japan": "Tokio", "India": "Neu-Delhi", "South Korea": "Seoul", "Russia": "Moskau",
    "Australia": "Canberra", "New Zealand": "Wellington", "Indonesia": "Jakarta", "Vietnam": "Hanoi",
    "Thailand": "Bangkok", "Philippines": "Manila", "Pakistan": "Islamabad", "Bangladesh": "Dhaka",
    "Iran": "Teheran", "Iraq": "Bagdad", "Saudi Arabia": "Riad", "Israel": "Jerusalem",
    "Turkey": "Ankara", "Kazakhstan": "Astana", "Uzbekistan": "Taschkent", "Afghanistan": "Kabul",
    "Mongolia": "Ulan-Bator", "Nepal": "Kathmandu", "Sri Lanka": "Colombo",
    // Afrika
    "Egypt": "Kairo", "South Africa": "Pretoria", "Nigeria": "Abuja", "Kenya": "Nairobi",
    "Ethiopia": "Addis Abeba", "Morocco": "Rabat", "Algeria": "Algier", "Tunisia": "Tunis",
    "Libya": "Tripolis", "Sudan": "Khartum", "Senegal": "Dakar", "Ghana": "Accra",
    "Angola": "Luanda", "Tanzania": "Dodoma", "Uganda": "Kampala", "Namibia": "Windhuk",
    "Madagascar": "Antananarivo", "Zimbabwe": "Harare", "Zambia": "Lusaka", "Mali": "Bamako"
};

// ================== MAP ==================
let map, geoLayer, countryLayers = {}, countriesPool=[];

// ================== INIT ==================
document.getElementById("playerCount").addEventListener("change", createInputs);
createInputs();

function createInputs(){
    let n = playerCount.value;
    playerInputs.innerHTML = "";
    for(let i=1;i<=n;i++){
        playerInputs.innerHTML += `<input id="p${i}" placeholder="Spieler ${i}">`;
    }
}

function startGame(){
    Game.mode = gameMode.value;
    Game.players = [];

    for(let i=1;i<=playerCount.value;i++){
        let name = document.getElementById("p"+i).value || "S"+i;
        Game.players.push(name);
        Game.scores[name] = 0;
    }

    start.style.display="none";
    initMap();
}

// ================== MAP ==================
function initMap(){
    if(map !== undefined) return;

    map = L.map("map").setView([20,0],2);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json")
    .then(r=>r.json())
    .then(data=>{
        geoLayer = L.geoJSON(data,{
            style: baseStyle,
            onEachFeature:(f,l)=>{
                let name = f.properties.name;
                if(name.includes("United States")) name="USA";

                countryLayers[name]=l;
                l.on("click", ()=>handleClick(name));
            }
        }).addTo(map);

        updatePool();
        nextTurn();
    });
}

// ================== STYLES ==================
function baseStyle(){
    return {
        color:"#94a3b8",
        weight:1,
        fillColor:"#e2e8f0",
        fillOpacity:1
    };
}

function markWrong(layer){
    if(layer._isWrong) return;

    layer._isWrong = true;
    layer.setStyle({ fillColor:"#fca5a5" });

    setTimeout(()=>{
        layer._isWrong=false;
        layer.setStyle({ fillColor:"#e2e8f0" });
    },400);
}

// ================== GAME ==================
function updatePool(){
    countriesPool = Object.keys(countryLayers)
        .filter(c => capitals.hasOwnProperty(c));
}

function nextTurn(){
    waitingForNext = false;
    Game.attempts = 0;
    resetStyles();

    Game.currentCountry =
        countriesPool[Math.floor(Math.random()*countriesPool.length)];

    let question = Game.mode==="country"
        ? `Finde: <b>${Game.currentCountry}</b>`
        : `Hauptstadt: <b>${capitals[Game.currentCountry]}</b>`;

    message.innerHTML = question;
    scoreDisplay.innerHTML =
        `${Game.players[Game.currentPlayer]}: ${Game.scores[Game.players[Game.currentPlayer]]}`;

    smiley.innerHTML="🤔";
}

// ================== CLICK ==================
function handleClick(name){
    if(waitingForNext) return;

    if(name === Game.currentCountry){
        Game.scores[Game.players[Game.currentPlayer]] += (Game.attempts===0 ? 3 : 1);
        showFeedback(true);
    } else {
        Game.attempts++;

        let layer = countryLayers[name];
        if(layer) markWrong(layer);

        if(Game.attempts===1){
            smiley.innerHTML="📍";
            map.flyTo(countryLayers[Game.currentCountry].getBounds().getCenter(),3.5);
        } else if(Game.attempts>=3){
            showFeedback(false);
        } else {
            smiley.innerHTML="❌";
        }
    }
}

// ================== FEEDBACK ==================
function showFeedback(correct){
    waitingForNext = true;

    let layer = countryLayers[Game.currentCountry];
    let overlay = correct ? correctBox : solutionBox;

    layer.setStyle({
        fillColor: correct ? "#22c55e" : "#ef4444",
        weight:3
    });

    if(layer._path) layer._path.classList.add("pulse");

    let info = `<b>${Game.currentCountry}</b><br>Hauptstadt: ${capitals[Game.currentCountry]}`;

    overlay.innerHTML = `
        ${correct ? "Richtig! 🎉" : "Lösung"}
        <br><br>${info}
        <br>
        <button onclick="nextRound()">Weiter</button>
    `;

    overlay.style.display="block";
}

function nextRound(){
    correctBox.style.display="none";
    solutionBox.style.display="none";

    Game.currentPlayer = (Game.currentPlayer+1)%Game.players.length;
    nextTurn();
}

// ================== RESET ==================
function resetStyles(){
    geoLayer.setStyle(baseStyle());
}

// ================== DOM ==================
const message = document.getElementById("message");
const scoreDisplay = document.getElementById("scoreDisplay");
const smiley = document.getElementById("smiley");
const correctBox = document.getElementById("correct");
const solutionBox = document.getElementById("solution");
</script>

</body>
</html>
